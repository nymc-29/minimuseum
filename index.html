<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Museum</title>
    <style>
        /* 기본 배경 (입장 전: 어두운 톤) */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1A1A1A;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            
            /* 배경 및 글자색 가속도 전환 효과 (배경색이 변할 때 1.2초 동안 부드럽게 가속) */
            transition: background 1.2s cubic-bezier(0.7, 0, 0.3, 1), 
                        color 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        /* 💡 입장 후에는 자바스크립트가 body에 직접 개별 그라데이션 스타일을 꽂아줄 예정이므로, 
           body.bg-changed 스타일은 삭제하거나 비워둡니다. 기본 글자색만 지정합니다. */
        body.bg-changed {
            color: #222222; 
        }

        /* 첫 안내 문구 */
        #intro-message {
            position: absolute;
            font-size: 18px;
            color: #888888;
            letter-spacing: 2px;
            animation: blink 2s infinite;
            z-index: 20;
            user-select: none;
            transition: opacity 0.8s cubic-bezier(0.7, 0, 0.3, 1), transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 메인 박스 레이아웃 구조 */
        .slider-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 900px;
            height: auto;
            opacity: 0;
            transform: scale(0.8);
            visibility: hidden;
            transition: opacity 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        body.bg-changed .slider-container {
            opacity: 1;
            transform: scale(1);
            visibility: visible;
        }

        /* 이미지와 카드 해설칸 배치 영역 */
        .museum-content {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 40px;
            width: 100%;
        }

        /* 가속도 이미지 설정 */
        .slide-img {
            width: 60%;
            height: auto;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            
            display: none;
            opacity: 0;
            transform: translateX(40px) scale(0.95);
            transition: opacity 0.6s cubic-bezier(0.76, 0, 0.24, 1), transform 0.6s cubic-bezier(0.76, 0, 0.24, 1);
        }

        .slide-img.active { display: block; }
        .slide-img.fade-in { opacity: 1; transform: translateX(0) scale(1); }

        /* 카드식 해설칸 스타일 */
        .museum-card {
            width: 35%;
            background-color: #ffffff;
            padding: 24px;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #444444;
            text-align: left;
            
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .museum-card.active { display: block; }
        .museum-card.fade-in { opacity: 1; transform: translateY(0); }

        .card-row-origin { font-size: 18px; font-weight: bold; color: #111111; margin-bottom: 4px; }
        .card-row-translation { font-size: 15px; color: #555555; margin-bottom: 12px; border-bottom: 1px dashed #dddddd; padding-bottom: 8px; }

        /* 화살표 버튼 스타일 */
        .arrow-btn {
            position: absolute;
            top: 45%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.05);
            color: #222222;
            border: none;
            font-size: 30px;
            padding: 12px 18px;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.3s, color 0.3s;
            user-select: none;
            z-index: 30;
        }

        .arrow-btn:hover { 
            background-color: rgba(0, 0, 0, 0.8); 
            color: #ffffff;
        }
        .prev-btn { left: -70px; }
        .next-btn { right: -70px; }
    </style>
</head>
<body onclick="activateMuseum()" onkeydown="activateMuseum()">

    <div id="intro-message">화면을 클릭하여 입장하세요.</div>

    <div class="slider-container">
        <button class="arrow-btn prev-btn" onclick="event.stopPropagation(); changeSlide(-1)">&lt;</button>

        <div class="museum-content">
            <img src="6r5JzlD9jQ9JhuN5nT-KSrSEQfKZisMYriGDrKbOwedfPaZOyDvkbcjS7hQSzVtws7sSz4M8iDPZjyEKG_-_og.jpg" alt="별이 빛나는 밤" class="slide-img active fade-in">
            <img src="https://images.unsplash.com/photo-1580136579312-94651dfd596d?w=600" alt="작품 2" class="slide-img">
            <img src="https://images.unsplash.com/photo-1547891654-e66ed7edd96c?w=600" alt="작품 3" class="slide-img">

            <div class="museum-card active fade-in">
                <div class="card-row-origin">The Flowery Stage - Artist A</div>
                <div class="card-row-translation">꽃이 피는 무대 - 화가 A</div>
            </div>
            <div class="museum-card">
                <div class="card-row-origin">Deep Ocean Meditation - Artist B</div>
                <div class="card-row-translation">깊은 바다의 명상 - 화가 B</div>
            </div>
            <div class="museum-card">
                <div class="card-row-origin">Abstract Harmony - Artist C</div>
                <div class="card-row-translation">추상적인 조화 - 화가 C</div>
            </div>
        </div>

        <button class="arrow-btn next-btn" onclick="event.stopPropagation(); changeSlide(1)">&gt;</button>
    </div>

    <audio id="bgm1" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    <audio id="bgm2" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" loop></audio>
    <audio id="bgm3" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" loop></audio>

    <script>
        let currentIdx = 0;
        let isActivated = false;
        const slides = document.querySelectorAll('.slide-img');
        const cards = document.querySelectorAll('.museum-card');
        
        const playlist = [
            document.getElementById('bgm1'),
            document.getElementById('bgm2'),
            document.getElementById('bgm3')
        ];

        // 💡 [핵심 추가] 각 그림 번호(0, 1, 2)에 맞는 그라데이션 배경 배열
        // 그림 분위기에 맞는 색상 코드로 자유롭게 변경 가능합니다.
        const backgroundStyles = [
            "radial-gradient(circle, #fcfbf9 0%, #eae7e2 70%, #dcd8d0 100%)", // 1번 그림: 웜 화이트
            "radial-gradient(circle, #f0f4f8 0%, #d9e2ec 70%, #bcccdc 100%)", // 2번 그림: 은은한 블루 화이트
            "radial-gradient(circle, #faf5ff 0%, #f3e8ff 70%, #e9d5ff 100%)"  // 3번 그림: 연한 연보라 톤
        ];

        // 배경을 부드럽게 변경해 주는 함수
        function updateBackground() {
            document.body.style.background = backgroundStyles[currentIdx];
        }

        function activateMuseum() {
            if (isActivated) return;
            isActivated = true;

            const intro = document.getElementById('intro-message');
            intro.style.opacity = '0';
            intro.style.transform = 'translateY(-20px)';
            setTimeout(() => intro.style.display = 'none', 800);

            document.body.classList.add('bg-changed');
            updateBackground(); // 💡 입장 시 1번 그림의 배경 설정

            if (playlist[currentIdx]) {
                playlist[currentIdx].play().catch(err => console.log(err));
            }
        }

        function stopAllAudio() {
            playlist.forEach(audio => {
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                }
            });
        }

        function changeSlide(direction) {
            if (!isActivated) return;

            const prevSlide = slides[currentIdx];
            const prevCard = cards[currentIdx];
            
            prevSlide.classList.remove('fade-in');
            if(prevCard) prevCard.classList.remove('fade-in');
            stopAllAudio();

            setTimeout(() => {
                prevSlide.classList.remove('active');
                if(prevCard) prevCard.classList.remove('active');
                
                currentIdx += direction;
                if (currentIdx < 0) currentIdx = slides.length - 1;
                else if (currentIdx >= slides.length) currentIdx = 0;

                const nextSlide = slides[currentIdx];
                const nextCard = cards[currentIdx];
                
                // 💡 그림이 바뀌는 타이밍에 배경색도 부드럽게 세팅
                updateBackground();

                nextSlide.style.transition = 'none';
                nextSlide.style.transform = direction > 0 
                    ? 'translateX(40px) scale(0.95)'  
                    : 'translateX(-40px) scale(0.95)'; 
                nextSlide.style.opacity = '0';
                nextSlide.classList.add('active');

                if(nextCard) {
                    nextCard.style.transition = 'none';
                    nextCard.style.transform = 'translateY(15px)';
                    nextCard.style.opacity = '0';
                    nextCard.classList.add('active');
                }

                setTimeout(() => {
                    nextSlide.style.transition = ''; 
                    nextSlide.classList.add('fade-in');
                    
                    if(nextCard) {
                        nextCard.style.transition = '';
                        nextCard.classList.add('fade-in');
                    }
                }, 20); 

                if (playlist[currentIdx]) {
                    playlist[currentIdx].play().catch(err => console.log(err));
                }
            }, 300); 
        }
    </script>

</body>
</html>
