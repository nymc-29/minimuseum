<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Museum</title>
    <style>
        /* 기본 배경 (입장 전: 어두운 톤) */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1A1A1A;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 배경 및 글자색 부드러운 전환 */
            transition: background 1.2s cubic-bezier(0.7, 0, 0.3, 1), 
                        color 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }

        body.bg-changed {
            color: #222222; 
        }

        /* 첫 안내 문구 */
        #intro-message {
            position: absolute;
            font-size: 18px;
            color: #888888;
            letter-spacing: 2px;
            animation: blink 2s infinite;
            z-index: 20;
            user-select: none;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 메인 박스 레이아웃 구조 */
        .slider-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 900px;
            height: auto;
            opacity: 0;
            transform: scale(0.8);
            visibility: hidden;
            transition: opacity 1.2s cubic-bezier(0.34, 1.56, 0.64, 1), transform 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        body.bg-changed .slider-container {
            opacity: 1;
            transform: scale(1);
            visibility: visible;
        }

        /* 이미지와 카드 해설칸 배치 영역 */
        .museum-content {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 40px;
            width: 100%;
        }

        /* 이미지 스타일 및 전환 효과 */
        .slide-img {
            width: 60%;
            height: auto;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.12);
            
            display: none;
            opacity: 0;
            transform: translateX(40px) scale(0.95);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* 활성화 상태 */
        .slide-img.active { 
            display: block; 
        }
        /* 페이드인 완료 상태 */
        .slide-img.fade-in { 
            opacity: 1; 
            transform: translateX(0) scale(1); 
        }

        /* 카드식 해설칸 스타일 및 전환 효과 */
        .museum-card {
            width: 35%;
            background-color: #ffffff;
            padding: 24px;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #444444;
            text-align: left;
            
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .museum-card.active { 
            display: block; 
        }
        .museum-card.fade-in { 
            opacity: 1; 
            transform: translateY(0); 
        }

        .card-row-origin { font-size: 18px; font-weight: bold; color: #111111; margin-bottom: 4px; }
        .card-row-translation { font-size: 15px; color: #555555; margin-bottom: 12px; border-bottom: 1px dashed #dddddd; padding-bottom: 8px; }

        /* 화살표 버튼 스타일 */
        .arrow-btn {
            position: absolute;
            top: 45%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.05);
            color: #222222;
            border: none;
            font-size: 30px;
            padding: 12px 18px;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.3s, color 0.3s;
            user-select: none;
            z-index: 30;
        }

        .arrow-btn:hover { 
            background-color: rgba(0, 0, 0, 0.8); 
            color: #ffffff;
        }
        .prev-btn { left: -70px; }
        .next-btn { right: -70px; }
    </style>
</head>
<body onclick="activateMuseum()" onkeydown="activateMuseum()">

    <div id="intro-message">화면을 클릭하여 입장하세요.</div>

    <div class="slider-container">
        <button class="arrow-btn prev-btn" onclick="event.stopPropagation(); changeSlide(-1)">&lt;</button>

        <div class="museum-content">
            <img src="https://ibb.co/Y7NY6FBm" alt="별이 빛나는 밤" class="slide-img active fade-in">
            <img src="https://ibb.co/r2Mc8JpC" alt="해바라기" class="slide-img">
            <img src="3.jpg" alt="작품 3" class="slide-img">

            <div class="museum-card active fade-in">
                <div class="card-row-origin">De sterrennacht - Vincent van Gogh</div>
                <div class="card-row-translation">별이 빛나는 밤 - 빈센트 반 고흐</div>
            </div>
            <div class="museum-card">
                <div class="card-row-origin">Sunflowers - Vincent van Gogh</div>
                <div class="card-row-translation">해바라기 - 빈센트 반 고흐</div>
            </div>
            <div class="museum-card">
                <div class="card-row-origin">Abstract Harmony - Artist C</div>
                <div class="card-row-translation">추상적인 조화 - 화가 C</div>
            </div>
        </div>

        <button class="arrow-btn next-btn" onclick="event.stopPropagation(); changeSlide(1)">&gt;</button>
    </div>

    <script>
        let currentIdx = 0;
        let isActivated = false;
        const slides = document.querySelectorAll('.slide-img');
        const cards = document.querySelectorAll('.museum-card');

        const backgroundStyles = [
            "radial-gradient(circle, #fcfbf9 0%, #eae7e2 70%, #dcd8d0 100%)", 
            "radial-gradient(circle, #f0f4f8 0%, #d9e2ec 70%, #bcccdc 100%)", 
            "radial-gradient(circle, #faf5ff 0%, #f3e8ff 70%, #e9d5ff 100%)"  
        ];

        function updateBackground() {
            document.body.style.background = backgroundStyles[currentIdx];
        }

        // 박물관 입장 함수
        function activateMuseum() {
            if (isActivated) return;
            isActivated = true;

            const intro = document.getElementById('intro-message');
            intro.style.opacity = '0';
            intro.style.transform = 'translateY(-20px)';
            setTimeout(() => intro.style.display = 'none', 800);

            document.body.classList.add('bg-changed');
            updateBackground(); 
        }

        // 슬라이드 전환 함수
        function changeSlide(direction) {
            if (!isActivated) return;

            const prevSlide = slides[currentIdx];
            const prevCard = cards[currentIdx];
            
            // 1. 기존 슬라이드 & 카드 페이드 아웃 시작
            prevSlide.classList.remove('fade-in');
            if (prevCard) prevCard.classList.remove('fade-in');

            // 2. 페이드 아웃 애니메이션(0.4초) 후 숨김(display: none) 처리
            setTimeout(() => {
                prevSlide.classList.remove('active');
                if (prevCard) prevCard.classList.remove('active');
                
                // 인덱스 계산
                currentIdx += direction;
                if (currentIdx < 0) currentIdx = slides.length - 1;
                else if (currentIdx >= slides.length) currentIdx = 0;

                const nextSlide = slides[currentIdx];
                const nextCard = cards[currentIdx];
                
                // 배경색 업데이트
                updateBackground();

                // 3. 새 슬라이드 등장 위치 미리 세팅 (방향에 따라 좌/우 설정)
                nextSlide.style.transform = direction > 0 
                    ? 'translateX(50px) scale(0.95)'  
                    : 'translateX(-50px) scale(0.95)'; 
                
                // 4. 새 슬라이드와 카드 활성화 (display: block)
                nextSlide.classList.add('active');
                if (nextCard) nextCard.classList.add('active');

                // 5. 브라우저 렌더링 동기화를 위해 미세한 딜레이 후 페이드인 시작
                setTimeout(() => {
                    nextSlide.classList.add('fade-in');
                    if (nextCard) nextCard.classList.add('fade-in');
                }, 50); 

            }, 400); 
        }
    </script>
</body>
</html>
